metadata:
    name: blue-dep
spec:
   replicas: 2
   selector:
       matchLabels:
               app: blue
   template:
       metadata:
           name: tmp1
           labels:
              app: blue
       spec:
          containers:
              - name: super-mario
                image: kaali28/blue
                ports:
                   - containerPort: 80
