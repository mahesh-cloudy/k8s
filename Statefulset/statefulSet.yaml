apiVersion: apps/v1
kind: StatefulSet
metadata:
   name: redis
spec:
  serviceName: "redis"
  replicas: 3
  selector:
     matchLabels:
        app: redis
  template:
    metadata:
       name: tmp1
       labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:5.0.5
          ports:
            - containerPort: 6379
              name: redis
